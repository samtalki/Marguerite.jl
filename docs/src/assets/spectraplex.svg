<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <!-- axes -->
  <line x1="30" y1="130" x2="185" y2="130" stroke="#888" stroke-width="1"/>
  <line x1="30" y1="130" x2="30" y2="10" stroke="#888" stroke-width="1"/>
  <polygon points="185,130 179,127 179,133" fill="#888"/>
  <polygon points="30,10 27,16 33,16" fill="#888"/>
  <text x="188" y="134" font-size="11" fill="#555" font-family="serif" font-style="italic">c</text>
  <text x="20" y="10" font-size="11" fill="#555" font-family="serif" font-style="italic">b</text>
  <!-- feasible region: disk b² + (c - 1/2)² ≤ (1/2)² -->
  <!-- center at c=0.5 → x=95, b=0 → y=70; radius 0.5 → 65px -->
  <circle cx="95" cy="70" r="55" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <!-- center point (I/2) -->
  <circle cx="95" cy="70" r="2.5" fill="#1a73e8"/>
  <text x="100" y="66" font-size="8" fill="#1a73e8" font-family="sans-serif">I/2</text>
  <!-- boundary label -->
  <text x="108" y="28" font-size="9" fill="#1a73e8" font-family="serif" font-style="italic">tr(X)=1, X⪰0</text>
  <!-- tick marks -->
  <line x1="95" y1="128" x2="95" y2="132" stroke="#888" stroke-width="1"/>
  <text x="87" y="143" font-size="9" fill="#333" font-family="sans-serif">1/2</text>
  <text x="22" y="143" font-size="9" fill="#333" font-family="sans-serif">0</text>
  <!-- pure state endpoints on c-axis -->
  <circle cx="40" cy="70" r="2" fill="#1a73e8"/>
  <text x="33" y="63" font-size="8" fill="#333" font-family="sans-serif">(0,0)</text>
  <circle cx="150" cy="70" r="2" fill="#1a73e8"/>
  <text x="143" y="63" font-size="8" fill="#333" font-family="sans-serif">(1,0)</text>
</svg>
